name: Continuous Integration

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - 'development'
      - 'main'
      - 'master'

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run E2E tests
        run: npm run e2e
